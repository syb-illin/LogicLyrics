<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Logic Lyrics — Project Notes Studio for macOS</title>
  <desc id="desc">A restrained dark banner with the Logic Lyrics waveform mark and product description.</desc>
  <defs>
    <radialGradient id="glow" cx="72%" cy="18%" r="70%">
      <stop offset="0" stop-color="#b7a9f0" stop-opacity=".18"/>
      <stop offset=".55" stop-color="#89bdc7" stop-opacity=".06"/>
      <stop offset="1" stop-color="#0b0b0d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f7f4"/>
      <stop offset="1" stop-color="#c9c5ce"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="#0b0b0d"/>
  <rect width="1280" height="640" fill="url(#glow)"/>
  <path d="M0 590 C260 540 400 630 660 565 S1060 520 1280 575" fill="none" stroke="#fff" stroke-opacity=".055" stroke-width="1.5"/>
  <g transform="translate(830 144)">
