    <path d="M82 89 H56 V221 H82 M228 89 H254 V221 H228 M56 155 H116 C135 155 140 116 160 116 C182 116 184 197 208 197 C226 197 230 155 254 155" fill="none" stroke="url(#mark)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(112 125)">
    <text x="0" y="30" fill="#aaa8ae" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" letter-spacing="3.4">NATIVE macOS · LOCAL-FIRST</text>
    <text x="0" y="118" fill="#f4f3f1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="74" font-weight="750" letter-spacing="-4">Logic Lyrics</text>
    <text x="0" y="180" fill="#f4f3f1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="39" font-weight="540" letter-spacing="-1.5">Project Notes Studio</text>
    <text x="0" y="252" fill="#aaa8ae" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24">Logic Pro lyrics · Suno prompts · audio metadata</text>
