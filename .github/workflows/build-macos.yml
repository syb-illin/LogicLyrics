name: Build and release macOS app

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Build with the same lightweight pipeline as users
        env:
          LOGICLYRICS_NONINTERACTIVE: "1"
          LOGICLYRICS_DESTINATION: ${{ runner.temp }}/LogicLyrics.app
        run: |
          chmod +x BUILD.command LogicLyrics/Resources/UPDATE.command
          ./BUILD.command

      - name: Package application and source updater asset
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "$RUNNER_TEMP/LogicLyrics.app" \
            "$RUNNER_TEMP/LogicLyrics.app.zip"
          zip -qry "$RUNNER_TEMP/LogicLyrics-macOS-source.zip" . \
            -x '.git/*' '.build/*' '*.DS_Store'
          cd "$RUNNER_TEMP"
          shasum -a 256 LogicLyrics.app.zip > LogicLyrics.app.zip.sha256
          shasum -a 256 LogicLyrics-macOS-source.zip > LogicLyrics-macOS-source.zip.sha256

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LogicLyrics-macOS
          path: |
            ${{ runner.temp }}/LogicLyrics.app.zip
            ${{ runner.temp }}/LogicLyrics.app.zip.sha256
            ${{ runner.temp }}/LogicLyrics-macOS-source.zip
            ${{ runner.temp }}/LogicLyrics-macOS-source.zip.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "$RUNNER_TEMP/LogicLyrics.app.zip" \
            "$RUNNER_TEMP/LogicLyrics.app.zip.sha256" \
            "$RUNNER_TEMP/LogicLyrics-macOS-source.zip" \
            "$RUNNER_TEMP/LogicLyrics-macOS-source.zip.sha256" \
            --title "Logic Lyrics ${GITHUB_REF_NAME}" \
            --generate-notes --verify-tag
